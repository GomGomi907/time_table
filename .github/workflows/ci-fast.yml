name: CI Fast

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: ci-fast-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend tests, bootJar, AI baseline
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Run backend verification
        working-directory: backend
        run: .\gradlew.bat test bootJar aiBaselineEval --no-daemon

      - name: Upload backend reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-reports
          if-no-files-found: ignore
          path: |
            backend/build/reports/tests/**
            backend/build/reports/ai-baseline/**

  frontend:
    name: Frontend typecheck, build, hygiene, audit
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Typecheck frontend
        run: npm --prefix frontend run typecheck

      - name: Build frontend
        run: npm --prefix frontend run build

      - name: Verify frontend hygiene
        run: npm --prefix frontend run verify:hygiene

      - name: Audit production frontend dependencies
        run: npm --prefix frontend audit --omit=dev

  visual-targeted:
    name: Targeted visual QA
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Install Playwright Chromium
        run: npm --prefix frontend run e2e:install

      - name: Run targeted visual QA
        run: npm --prefix frontend run visual:local

      - name: Upload Playwright and service logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-targeted-artifacts
          if-no-files-found: ignore
          path: |
            frontend/playwright-report/**
            frontend/test-results/**
            .omx/logs/e2e-local-*.log

  release-hygiene:
    name: Release hygiene smoke
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run release hygiene checks
        shell: pwsh
        run: .\scripts\verify-release.ps1 -SkipBackend -SkipFrontend

      - name: Upload release readiness report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-readiness-report
          if-no-files-found: ignore
          path: .omx/reports/release-readiness-*.*
