services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: timetable
      POSTGRES_USER: timetable
      POSTGRES_PASSWORD: timetable
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U timetable -d timetable"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_DB_URL: jdbc:postgresql://postgres:5432/timetable
      APP_DB_USERNAME: timetable
      APP_DB_PASSWORD: timetable
      APP_FRONTEND_URL: http://localhost:3000
      APP_AI_ENABLED: "true"
      APP_AI_BASE_URL: http://llm:8000/v1
      APP_AI_API_KEY: ${APP_AI_API_KEY:-time-table-local}
      APP_AI_MODEL: ${APP_AI_MODEL:-google/gemma-4-E2B-it}
      GOOGLE_CREDENTIALS_FILE: /run/secrets/client_secret.json
    ports:
      - "8080:8080"
    volumes:
      - ./.local/secrets:/run/secrets:ro

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080/api
    ports:
      - "3000:3000"

  llm:
    profiles: ["llm"]
    image: vllm/vllm-openai:gemma4
    command:
      - --model
      - ${APP_AI_MODEL:-google/gemma-4-E2B-it}
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --api-key
      - ${APP_AI_API_KEY:-time-table-local}
      - --max-model-len
      - ${VLLM_MAX_MODEL_LEN:-8192}
      - --gpu-memory-utilization
      - ${VLLM_GPU_MEMORY_UTILIZATION:-0.9}
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
    ports:
      - "8001:8000"
    ipc: host
    gpus: all
    volumes:
      - huggingface-cache:/root/.cache/huggingface

volumes:
  postgres-data:
  huggingface-cache:
