services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-timetable}
      POSTGRES_USER: ${POSTGRES_USER:-timetable}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-timetable} -d ${POSTGRES_DB:-timetable}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-timetable}
      APP_DB_USERNAME: ${POSTGRES_USER:-timetable}
      APP_DB_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      APP_FRONTEND_URL: ${APP_FRONTEND_URL:-http://localhost:3000}
      APP_AUTH_MOCK_LOGIN_ENABLED: ${APP_AUTH_MOCK_LOGIN_ENABLED:-false}
      APP_SYNC_GOOGLE_MOCK_ENABLED: ${APP_SYNC_GOOGLE_MOCK_ENABLED:-false}
      APP_AI_ENABLED: ${APP_AI_ENABLED:-false}
      APP_AI_BASE_URL: ${APP_AI_BASE_URL:-https://generativelanguage.googleapis.com/v1beta}
      APP_GEMINI_API_KEY: ${APP_GEMINI_API_KEY:-}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:-}
      APP_AI_MODEL: ${APP_AI_MODEL:-gemini-2.5-flash}
      GOOGLE_CREDENTIALS_FILE: ${GOOGLE_CREDENTIALS_FILE:-/run/secrets/client_secret.json}
    ports:
      - "8080:8080"
    volumes:
      - ./.local/secrets:/run/secrets:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
    ports:
      - "3000:3000"

volumes:
  postgres-data:
