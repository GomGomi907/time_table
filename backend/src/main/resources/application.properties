spring.application.name=ai-schedule-operator-backend

server.port=${SERVER_PORT:8080}
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
server.servlet.session.timeout=${APP_SESSION_TIMEOUT:4h}

spring.datasource.url=${APP_DB_URL:jdbc:h2:file:./data/timetable;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;AUTO_SERVER=TRUE}
spring.datasource.username=${APP_DB_USERNAME:sa}
spring.datasource.password=${APP_DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.h2.console.enabled=${APP_H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false

management.endpoints.web.exposure.include=health,info

app.release-mode=${APP_RELEASE_MODE:local}
app.require-safe-runtime=${APP_REQUIRE_SAFE_RUNTIME:false}
app.frontend-base-url=${APP_FRONTEND_URL:http://localhost:3000}
app.encryption.key=${APP_ENCRYPTION_KEY:}
app.auth.default-user-email=${APP_DEFAULT_USER_EMAIL:local@time-table.dev}
app.auth.default-user-name=${APP_DEFAULT_USER_NAME:Local User}
app.auth.google-client-id=${GOOGLE_CLIENT_ID:}
app.auth.google-client-secret=${GOOGLE_CLIENT_SECRET:}
# Google OAuth 자격 증명은 환경 변수 또는 로컬 client secret JSON 파일에서 읽습니다.
app.auth.google-credentials-file=${GOOGLE_CREDENTIALS_FILE:}
app.auth.google-token-url=${GOOGLE_TOKEN_URL:https://oauth2.googleapis.com/token}
app.auth.google-scopes=openid,profile,email,https://www.googleapis.com/auth/calendar.events,https://www.googleapis.com/auth/tasks
app.auth.mock-login-enabled=${APP_AUTH_MOCK_LOGIN_ENABLED:false}
app.calendar.sync-past-days=${APP_CALENDAR_SYNC_PAST_DAYS:7}
app.calendar.sync-future-days=${APP_CALENDAR_SYNC_FUTURE_DAYS:30}
app.sync.google.mock-enabled=${APP_SYNC_GOOGLE_MOCK_ENABLED:false}
app.sync.google.write-enabled=${APP_SYNC_GOOGLE_WRITE_ENABLED:true}
app.schedule.default-buffer-minutes=${APP_DEFAULT_BUFFER_MINUTES:10}
app.schedule.default-overtime-trigger-minutes=${APP_DEFAULT_OVERTIME_TRIGGER_MINUTES:15}
app.schedule.default-open-gap-trigger-minutes=${APP_DEFAULT_OPEN_GAP_TRIGGER_MINUTES:30}
app.schedule.default-quiet-hours-start=${APP_DEFAULT_QUIET_HOURS_START:22:00}
app.schedule.default-quiet-hours-end=${APP_DEFAULT_QUIET_HOURS_END:08:00}
app.ai.enabled=${APP_AI_ENABLED:false}
app.ai.base-url=${APP_AI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}
app.ai.api-key=${APP_GEMINI_API_KEY:${APP_AI_API_KEY:}}
app.ai.model=${APP_AI_MODEL:gemini-2.5-flash}
app.ai.max-tokens=${APP_AI_MAX_TOKENS:2048}
app.ai.temperature=${APP_AI_TEMPERATURE:0.0}
app.ai.timeout-seconds=${APP_AI_TIMEOUT_SECONDS:8}

# Local/test-only: forces schedule mutations to return 409 for conflict-modal QA. Must stay false in beta/production.
